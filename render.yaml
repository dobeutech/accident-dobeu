databases:
  - name: accident-app-db
    plan: starter
    databaseName: accident_app
    user: accident_app_user
    ipAllowList: []

services:
  - type: web
    name: accident-app-backend
    runtime: node
    plan: starter
    region: oregon
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        fromDatabase:
          name: accident-app-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: accident-app-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: accident-app-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: accident-app-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: accident-app-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: accident-app-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: MAX_LOGIN_ATTEMPTS
        value: "5"
      - key: LOCKOUT_DURATION
        value: "900000"
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_SWAGGER_DOCS
        value: "false"
      - key: ENABLE_METRICS
        value: "true"
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: ALLOWED_FILE_TYPES
        value: image/jpeg,image/png,image/gif,application/pdf

  - type: web
    name: accident-app-web
    runtime: static
    buildCommand: cd web && npm ci && npm run build
    staticPublishPath: web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /api/*
        destination: https://accident-app-backend.onrender.com/api/*
      - type: rewrite
        source: /socket.io/*
        destination: https://accident-app-backend.onrender.com/socket.io/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_ENV
        value: production
      - key: VITE_APP_NAME
        value: Fleet Accident Reporter
